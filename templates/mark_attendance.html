{% extends "base.html" %}
{% block title %}Mark Attendance{% endblock %}
{% block content %}

<h2>Mark Attendance</h2>

<form method="post" action="/mark_attendance">
  <div class="mb-3">
    <label class="form-label">Date</label>
    <input type="date" name="date" class="form-control" required>
  </div>

  <div class="mb-3">
    <label class="form-label">Present Players</label>
    <div class="list-group">
      {% for num, player in players.items() %}
      <label class="list-group-item">
        <input type="checkbox" name="present" value="{{ num }}" class="form-check-input me-1">
        {{ player.name }} (#{{ num }})
      </label>
      {% endfor %}
    </div>
  </div>

  <button type="submit" class="btn btn-success">Submit</button>
  <a href="/attendance" class="btn btn-secondary">Cancel</a>
</form>

{% endblock %}
